<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1 Bakery Admin - Settings</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/auth-guard.js"></script>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo-icon"><i class="fas fa-bread-slice" style="color: white;"></i></div>
                <span class="logo-text">A1 Bakery</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="products.html" class="nav-item">
                    <i class="fas fa-box"></i>
                    <span>Products</span>
                </a>
                <a href="categories.html" class="nav-item">
                    <i class="fas fa-tags"></i>
                    <span>Categories</span>
                </a>
                <a href="orders.html" class="nav-item">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Orders</span>
                </a>
                <a href="customers.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
                <a href="analytics.html" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>Analytics</span>
                </a>
                <a href="gallery.html" class="nav-item">
                    <i class="fas fa-images"></i>
                    <span>Gallery</span>
                </a>
                <a href="settings.html" class="nav-item active">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>Settings</h1>
                    <p>Configure your shop and admin profile.</p>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" id="saveSettingsBtn">Save Changes</button>
                </div>
            </header>

            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 2rem;">
                <div class="glass" style="padding: 1.5rem;">
                    <h3>Shop Info</h3>
                    <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 1.5rem;">Basic identity of your bakery.</p>
                    <div class="form-group">
                        <label>Shop Name</label>
                        <input type="text" class="form-input" value="A1 Bakery">
                    </div>
                    <div class="form-group">
                        <label>Support Email</label>
                        <input type="email" class="form-input" value="support@a1bakery.com">
                    </div>
                    <div class="form-group">
                        <label>Currency</label>
                        <select class="form-select">
                            <option>USD ($)</option>
                            <option>EUR (€)</option>
                            <option>INR (₹)</option>
                        </select>
                    </div>
                </div>

                <div class="glass" style="padding: 1.5rem;">
                    <h3>Admin Profile</h3>
                    <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 1.5rem;">Manage your personal account settings.</p>
                    <div style="display: flex; gap: 2rem; align-items: center; margin-bottom: 2rem;">
                        <div class="user-avatar" style="width: 100px; height: 100px; font-size: 2.5rem;">AD</div>
                        <div>
                            <button class="btn btn-secondary">Change Avatar</button>
                            <p style="font-size: 0.8rem; color: var(--text-dim); margin-top: 0.5rem;">Recommended size: 256x256px</p>
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" class="form-input" value="Admin">
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" class="form-input" value="User">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" class="form-input" placeholder="Leave blank to keep current">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/settings.js"></script>
</body>
</html>
