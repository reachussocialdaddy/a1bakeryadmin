<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-ONE BAKERY Admin - Add Product</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/auth-guard.js"></script>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo-icon"><i class="fas fa-bread-slice" style="color: white;"></i></div>
                <span class="logo-text">A-ONE BAKERY</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="products.html" class="nav-item active">
                    <i class="fas fa-box"></i>
                    <span>Products</span>
                </a>
                <a href="categories.html" class="nav-item">
                    <i class="fas fa-tags"></i>
                    <span>Categories</span>
                </a>
                <a href="orders.html" class="nav-item">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Orders</span>
                </a>
                <a href="customers.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
                <a href="analytics.html" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>Analytics</span>
                </a>
                <a href="gallery.html" class="nav-item">
                    <i class="fas fa-images"></i>
                    <span>Gallery</span>
                </a>
                <a href="settings.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="login.html" class="nav-item">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>Add New Product</h1>
                    <p>Fill in the details to list a new item in the shop.</p>
                </div>
                <div class="header-right">
                    <a href="products.html" class="btn btn-secondary">Cancel</a>
                    <button type="submit" form="productForm" class="btn btn-primary">Save Product</button>
                </div>
            </header>

            <form id="productForm" class="glass" style="padding: 2rem;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                    <!-- Left Side: Basic Info -->
                    <div>
                        <div class="form-group">
                            <label>Product Name</label>
                            <input type="text" class="form-input" placeholder="e.g. Classic Cheesecake" required>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select class="form-select" required>
                                <option value="">Select Category</option>
                                <option value="cakes">Cakes</option>
                                <option value="bread">Bread</option>
                                <option value="pastries">Pastries</option>
                            </select>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label>Price ($)</label>
                                <input type="number" class="form-input" placeholder="0.00" step="0.01" required>
                            </div>
                            <div class="form-group">
                                <label>Stock Quantity</label>
                                <input type="number" class="form-input" placeholder="0" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea class="form-textarea" rows="5" placeholder="Describe your delicious product..."></textarea>
                        </div>
                    </div>

                    <!-- Right Side: Media & Settings -->
                    <div>
                        <div class="form-group">
                            <label>Product Image</label>
                            <div id="dropzone" style="border: 2px dashed var(--border); border-radius: 16px; padding: 3rem; text-align: center; cursor: pointer; transition: var(--transition);">
                                <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;"></i>
                                <p>Click or Drag image here to upload</p>
                                <input type="file" id="fileInput" hidden accept="image/*">
                            </div>
                            <div id="imagePreview" style="margin-top: 1rem; display: none;">
                                <img id="previewImg" src="" style="width: 100%; border-radius: 12px; height: 200px; object-fit: cover;">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Visibility</label>
                            <div style="display: flex; gap: 2rem; margin-top: 0.5rem;">
                                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                    <input type="radio" name="visibility" value="public" checked> Public
                                </label>
                                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                    <input type="radio" name="visibility" value="hidden"> Hidden
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <script src="js/add-product.js"></script>
</body>
</html>
